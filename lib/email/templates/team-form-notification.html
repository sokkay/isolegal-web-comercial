<div
  style="
    margin: 0;
    padding: 24px;
    background: #f6f8f7;
    font-family: Manrope, Arial, sans-serif;
    color: #202b5f;
  "
>
  <table
    role="presentation"
    width="100%"
    cellpadding="0"
    cellspacing="0"
    style="
      max-width: 720px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
    "
  >
    <tr>
      <td style="padding: 24px; background: #1e5e3d; color: #ffffff">
        <div style="font-size: 22px; font-weight: 800; line-height: 1.2">
          Nueva respuesta de formulario
        </div>
        <div style="margin-top: 6px; font-size: 14px; opacity: 0.95">
          Isolegal · Notificación interna
        </div>
      </td>
    </tr>
    <tr>
      <td style="padding: 24px">
        <p style="margin: 0 0 12px 0; font-size: 15px; line-height: 1.6">
          Se registró una nueva respuesta en <strong>{{formLabel}}</strong>.
        </p>
        <p style="margin: 0 0 16px 0; font-size: 14px; line-height: 1.6; color: #475569">
          <strong>Fecha:</strong> {{submittedAtDisplay}}<br />
          <strong>Origen:</strong> {{source}}
        </p>

        <table
          role="presentation"
          width="100%"
          cellpadding="0"
          cellspacing="0"
          style="
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            margin: 0;
            background: #f8fafc;
          "
        >
          {{#each fields}}
          <tr>
            <td
              style="
                width: 36%;
                padding: 10px 14px;
                font-size: 13px;
                color: #64748b;
                border-bottom: 1px solid #e2e8f0;
                vertical-align: top;
              "
            >
              {{label}}
            </td>
            <td
              style="
                padding: 10px 14px;
                font-size: 13px;
                color: #0f172a;
                border-bottom: 1px solid #e2e8f0;
                word-break: break-word;
              "
            >
              {{value}}
            </td>
          </tr>
          {{/each}}
        </table>
      </td>
    </tr>
  </table>
</div>
